
# VM {{port}}
location /{{prefix}}/{{uuid}}/ {{ '{'}}
    proxy_pass http://127.0.0.1:{{port}}/;
    proxy_redirect off;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
{{ '}' }}

location /{{prefix}}/{{uuid}}/proxy/5000/ {{ '{'}}
    proxy_pass http://127.0.0.1:{{port}}/proxy/5000/;
    proxy_redirect off;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";

    # Rewrite HTML responses
    sub_filter_types text/html;
    sub_filter 'href="/' 'href="/{{prefix}}/{{uuid}}/proxy/5000/';
    sub_filter 'action="/' 'action="/{{prefix}}/{{uuid}}/proxy/5000/';
    sub_filter_once off;
{{ '}' }}
